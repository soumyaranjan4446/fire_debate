experiment_name: "fire_debate_v1"
device: "cuda" # or "cpu"

llm:
  # Using a small, powerful open model (Mistral or Zephyr)
  model_id: "TinyLlama/TinyLlama-1.1B-Chat-v1.0" 
  max_new_tokens: 256
  temperature: 0.7
  quantization: "none" # Critical for running locally

retrieval:
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  max_search_results: 10
  top_k_evidence: 3
  db_path: "./data/chroma_db"

debate:
  rounds: 3
  agents:
    pro: "RationalProponent"
    con: "RationalOpponent"